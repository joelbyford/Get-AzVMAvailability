name: "PowerShell Linting"

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    workflow_dispatch: # Allow manual trigger for baseline scans

permissions:
    contents: read
    security-events: write # Required for SARIF upload to code scanning

jobs:
    lint:
        name: PSScriptAnalyzer
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4.2.2

            - name: Run PSScriptAnalyzer
              uses: microsoft/psscriptanalyzer-action@v1.1
              with:
                  path: .
                  recurse: true
                  output: results.sarif
                  settings: ./PSScriptAnalyzerSettings.psd1

            - name: Upload SARIF results
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: results.sarif
              if: always()

    test:
        name: Pester Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4.2.2

            - name: Run Pester Tests
              shell: pwsh
              run: |
                  Install-Module -Name Pester -Force -SkipPublisherCheck
                  $results = Invoke-Pester ./tests -Output Detailed -PassThru
                  if ($results.FailedCount -gt 0) {
                    throw "$($results.FailedCount) test(s) failed"
                  }

    audit:
        name: Repo Self-Audit
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4.2.2

            - name: Install PSScriptAnalyzer
              shell: pwsh
              run: Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck

            - name: Run repo self-audit gate
              shell: pwsh
              run: |
                  ./tools/Invoke-RepoSelfAudit.ps1 `
                    -RepoRoot . `
                    -PrimaryScript Get-AzVMAvailability.ps1 `
                    -FailOnCritical `
                    -MaxAllowedCritical 2

            - name: Upload audit report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: audit-report
                  path: artifacts/audit/
